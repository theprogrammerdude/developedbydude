<app-navbar [isVisible]="true"></app-navbar>

<div class="flex flex-col items-center justify-center w-full">
  <div class="w-4/5 mt-5">
    <label
      for="first_name"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300"
      >Article Title</label
    >
    <input
      type="text"
      id="first_name"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
      [(ngModel)]="title"
    />
  </div>

  <div class="w-4/5 my-5">
    <label
      for="first_name"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300"
      >Article Description</label
    >
    <input
      type="text"
      id="first_name"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
      [(ngModel)]="description"
      maxlength="150"
    />

    <p
      id="helper-text-explanation"
      class="mt-2 text-sm text-gray-500 dark:text-gray-400"
    >
      {{ description.length }} / 150
    </p>
  </div>

  <ngx-dropzone (change)="onSelect($event)" class="w-4/5 mb-5">
    <ngx-dropzone-label>Upload Article Image</ngx-dropzone-label>
    <ngx-dropzone-preview
      *ngFor="let f of files"
      [removable]="true"
      (removed)="onRemove(f)"
    >
      <ngx-dropzone-label>{{ f.name }} ({{ f.type }})</ngx-dropzone-label>
    </ngx-dropzone-preview>
  </ngx-dropzone>

  <div
    class="w-4/5"
    [froalaEditor]="options"
    [(froalaModel)]="editortext"
  ></div>

  <div class="relative w-4/5">
    <button
      type="button"
      class="text-gray-900 bg-gray-100 hover:bg-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-500 mr-2 my-5 inset-y-0 right-0"
      (click)="create()"
    >
      Upload Article
    </button>
  </div>
</div>
